<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#001f3f" id="meta-theme-color">
    <title>Enterprise Scheduler</title>
    <link rel="icon" href="data:,">

    <script>
        const CONFIG = {
            GAS_URL: "https://script.google.com/macros/s/AKfycbxiO1y6rLA6lLLC0VZEgfdRpmy1kFrnLkC3377NvJY9twESS8dxD-fskDQWY6tXIX90/exec",
        };
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style id="white-label-styles"></style>

    <style>
        :root {
            --brand-pop-blue: #007bff; --brand-dark-blue: #001f3f;
            --brand-grey: #6c757d; --brand-accent-red: #dc3545;
            --brand-accent-light: #17a2b8; --app-bg: #f8f9fa;
            --card-bg: #ffffff; --text-main: #212529; --border-color: #dee2e6;
        }

        [data-bs-theme="dark"] {
            --brand-pop-blue: #0d6efd;
            --app-bg: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0;
            --border-color: #333333; --brand-dark-blue: #000c1a;
        }
        [data-bs-theme="dark"] .text-muted { color: #adb5bd !important; }

        body { background-color: var(--app-bg); color: var(--text-main); font-family: sans-serif; margin: 0; padding-top: env(safe-area-inset-top); overflow: hidden; }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--brand-dark-blue); z-index: 1070; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; transition: opacity 0.4s ease-out; }
    </style>
</head>
<body>

    <div id="loading-overlay" style="opacity: 1;">
        <img id="loadLogo" src="" alt="" style="width:200px; height:200px; object-fit:contain; opacity: 0; transition: opacity 0.5s; display: none;" class="mb-3">
        <div class="spinner-border text-light mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
        <h3 class="text-white" id="loading-text">Initializing System...</h3>
    </div>

    <div id="loginOverlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--app-bg); z-index: 1060; display: none; align-items: center; justify-content: center;">
      <div class="card p-4 shadow-sm text-center" style="max-width: 400px; width: 90%; background: var(--card-bg); border: 1px solid var(--border-color);">
        <div style="height: 300px; width: 300px; margin: 0 auto;" class="mb-3 d-flex justify-content-center align-items-center">
            <img id="loginLogo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="App Logo" style="max-width:100%; max-height:100%; object-fit:contain; opacity: 0; transition: opacity 0.5s;">
        </div>
        <h3 id="loginTitle" class="fw-bold mb-3" style="color: var(--brand-pop-blue);">Log in to Scheduler</h3>  
        <div id="googleSignInButton" class="d-flex justify-content-center align-items-center" style="min-height: 40px;">
            <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
            <span class="text-muted small">Loading Secure Login...</span>
        </div>
      </div>
    </div>

    <div id="accessDenied" class="d-none" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--app-bg); z-index: 1080; display: flex; align-items: center; justify-content: center;">
      <div class="card p-5 shadow-sm text-center" style="max-width: 500px; background: var(--card-bg); border: 1px solid var(--border-color);">
        <h2 class="text-danger fw-bold mb-3">Access Denied</h2>
        <p class="text-muted" id="accessDeniedMsg">You do not have permission to access the Scheduler. Please contact an administrator.</p>
        <p id="deniedEmail" class="fw-bold mt-3 text-secondary"></p>
        <button class="btn btn-outline-primary mt-3" onclick="window.Auth.signOut()">Return to Login</button>
      </div>
    </div>

    <div id="app-root"></div>

    <script>
        const ShellApp = {
            currentUserEmail: null,
            templateData: {},
            
            apiCall: async (action, payload = {}) => {
                if (!CONFIG.GAS_URL) return { success: false };
                if (ShellApp.currentUserEmail) payload.authEmail = ShellApp.currentUserEmail;
                
                try {
                    const syncIcon = document.getElementById('sync-icon');
                    if (syncIcon) syncIcon.classList.add('syncing');
                    
                    const res = await fetch(CONFIG.GAS_URL, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        redirect: 'follow', 
                        body: JSON.stringify({ action, payload }) 
                    });
                    const json = await res.json();
                    
                    if (syncIcon) syncIcon.classList.remove('syncing');
                    return json;
                } catch (e) {
                    console.error("API Error:", e);
                    return { success: false, error: "Network/Fetch Error: " + e.message };
                }
            },

            applyWhiteLabel: (templateObj) => {
                const t = templateObj || {};
                const finalTitle = t.app_title || 'Scheduler';
                document.title = finalTitle; 
                
                const titleEl = document.getElementById('ui-app-title');
                if (titleEl) titleEl.innerText = finalTitle; 
                document.getElementById('loginTitle').innerText = `Log in to ${finalTitle}`;
                
                if (t.brand_logo_url) {
                    const lImg = document.getElementById('loginLogo');
                    if(lImg) { lImg.src = t.brand_logo_url; lImg.style.opacity = '1'; }
                    const ldImg = document.getElementById('loadLogo');
                    if(ldImg) { ldImg.src = t.brand_logo_url; ldImg.style.display = 'block'; ldImg.style.opacity = '1'; }
                    const navImg = document.getElementById('nav-brand-logo');
                    if(navImg) { navImg.src = t.brand_logo_url; navImg.style.display = 'block'; }
                }

                const initGoogle = () => {
                    if (window.google && google.accounts && google.accounts.id) {
                        document.getElementById("googleSignInButton").innerHTML = ''; 
                        google.accounts.id.initialize({
                            client_id: t.google_client_id,
                            callback: window.Auth.handleCredentialResponse
                        });
                        google.accounts.id.renderButton(
                            document.getElementById("googleSignInButton"),
                            { theme: "outline", size: "large", type: "standard", shape: "rectangular" }
                        );
                    } else { setTimeout(initGoogle, 100); }
                };
                if (t.google_client_id) initGoogle();
                else document.getElementById("googleSignInButton").innerHTML = `<div class="alert alert-danger p-2 small">Google Client ID missing from Template.</div>`;

                document.getElementById('white-label-styles').innerHTML = `
                    :root {
                        --brand-pop-blue: ${t.theme_light_brand_pop || '#007bff'};
                        --brand-dark-blue: ${t.theme_light_brand_dark || '#001f3f'};
                        --app-bg: ${t.theme_light_app_bg || '#f8f9fa'};
                        --card-bg: ${t.theme_light_card_bg || '#ffffff'};
                        --text-main: ${t.theme_light_text_main || '#212529'};
                        --border-color: ${t.theme_light_border || '#dee2e6'};
                    }
                    [data-bs-theme="dark"] {
                        --brand-pop-blue: ${t.theme_dark_brand_pop || '#0d6efd'};
                        --app-bg: ${t.theme_dark_app_bg || '#121212'};
                        --card-bg: ${t.theme_dark_card_bg || '#1e1e1e'};
                        --text-main: ${t.theme_dark_text_main || '#e0e0e0'};
                        --border-color: ${t.theme_dark_border || '#333333'};
                        --brand-dark-blue: ${t.theme_dark_brand_dark || '#000c1a'};
                    }
                `;
            },

            secureBoot: async () => {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('loading-text').innerText = "Loading Secure Application...";
                document.getElementById('loading-overlay').style.display = 'flex';
                document.getElementById('loading-overlay').style.opacity = '1';

                const res = await ShellApp.apiCall('SYNC_DATA');

                if (res.success && res.data && res.data.payloadHtml && res.data.backendHtml) {
                    const activeStaff = res.data.staff.find(s => String(s.email).toLowerCase() === ShellApp.currentUserEmail && String(s.status).toLowerCase() === 'active');
                    
                    if (activeStaff) {
                        // INJECT HTML UI PAYLOAD
                        document.getElementById('app-root').innerHTML = res.data.payloadHtml;
                        
                        // INJECT JS LOGIC ENGINE
                        // Securely parse the file using DOM to guarantee we only extract Javascript and ignore stray HTML
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = res.data.backendHtml;
                        let extractedJs = '';
                        const scripts = tempDiv.getElementsByTagName('script');
                        for (let i = 0; i < scripts.length; i++) {
                            extractedJs += scripts[i].innerHTML + '\n';
                        }
                        
                        const scriptEl = document.createElement('script');
                        scriptEl.text = extractedJs;
                        document.body.appendChild(scriptEl);

                        // LAUNCH ENTERPRISE ENGINE
                        if (window.EnterpriseApp) {
                            window.EnterpriseApp.launch(res.data);
                            
                            // The backend engine has now securely formatted the template data. 
                            // Update the Shell's memory and apply the UI branding (including the logo).
                            ShellApp.templateData = res.data.template;
                            ShellApp.applyWhiteLabel(ShellApp.templateData);
                            
                            document.getElementById('loading-overlay').style.opacity = '0';
                            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 400);
                        } else {
                            alert("Critical Error: Application core failed to mount.");
                        }
                    } else {
                        document.getElementById('loading-overlay').style.display = 'none';
                        document.getElementById('accessDenied').classList.remove('d-none');
                        document.getElementById('deniedEmail').innerText = ShellApp.currentUserEmail;
                    }
                } else {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('accessDenied').classList.remove('d-none');
                    document.getElementById('deniedEmail').innerText = ShellApp.currentUserEmail;
                    
                    // Reveal the ACTUAL server error if one exists
                    let errorMsg = "Access Denied by Server or Payload failed to load.";
                    if (res && res.error) errorMsg = `Server Error: ${res.error}`;
                    
                    document.getElementById('accessDeniedMsg').innerText = errorMsg;
                }
            },

            init: async () => {
                const savedUserEmail = localStorage.getItem('scheduler_user');
                
                if (savedUserEmail) {
                    ShellApp.currentUserEmail = savedUserEmail;
                    ShellApp.secureBoot();
                    return;
                }

                document.getElementById('loading-text').innerText = "Initializing System Shell...";
                const res = await ShellApp.apiCall('INIT_APP'); 
                
                if (res.success && res.data) {
                    let tObj = {};
                    if (Array.isArray(res.data.template)) {
                        res.data.template.forEach(item => { if(item.key) tObj[item.key] = item.value; });
                    }
                    ShellApp.templateData = tObj;
                }
                
                ShellApp.applyWhiteLabel(ShellApp.templateData); 
                
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('loginOverlay').style.display = 'flex';
                }, 400);
            }
        };

        window.Auth = {
            parseJwt: (token) => {
                try {
                    const base64Url = token.split('.')[1];
                    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                    return JSON.parse(jsonPayload);
                } catch(e) { return null; }
            },
            handleCredentialResponse: (response) => {
                const data = window.Auth.parseJwt(response.credential);
                if (!data || !data.email) return alert("Error reading Google Credentials.");
                
                const email = data.email.toLowerCase().trim();
                ShellApp.currentUserEmail = email;
                localStorage.setItem('scheduler_user', email);
                ShellApp.secureBoot();
            },
            signOut: () => {
                localStorage.removeItem('scheduler_user');
                location.reload();
            }
        };

        window.ShellApp = ShellApp;
        document.addEventListener('DOMContentLoaded', ShellApp.init);
    </script>
</body>
</html>
