<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <title>Scheduler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>  
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <script>
    // POINT THIS TO YOUR CLIENT CODE.GS DEPLOYMENT URL
    const GAS_URL = "https://script.google.com/macros/s/YOUR_CLIENT_URL/exec";

    // Bridge for the injected Scheduler frontend to communicate seamlessly
    window.ShellApp = {
        currentUserEmail: null,
        apiCall: async (action, payload = {}) => {
            return await apiCall(action, { payload: payload });
        }
    };
  </script>

  <style>
    body { background-color: #f4f7f6; font-family: sans-serif; margin:0; padding:0; height: 100vh; width: 100%; overflow: hidden; }
    .hidden { display: none !important; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #001f3f; color: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease; }
    #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f7f6; z-index: 10000; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<div id="loginOverlay" class="hidden">
  <div class="card p-4 shadow-sm text-center" style="max-width: 400px; width: 90%; background: #ffffff;">    
    <div id="loginContent">
      <img id="loginLogo" src="" alt="" style="width:250px; height:250px; object-fit:contain; margin: 0 auto; opacity: 0; transition: opacity 0.5s;" class="mb-3">
      <h3 id="loginTitle" class="fw-bold mb-3" style="color: #007bff;">Scheduler Login</h3> 
      <div id="googleSignInBtn" class="d-flex justify-content-center"></div>
    </div>
  </div>
</div>

<div id="loadingOverlay">
  <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
  <h5 id="loading-text" class="fw-bold">Connecting to System...</h5>
</div>

<div id="accessDenied" class="container py-5 text-center hidden" style="position: absolute; z-index: 10001; background: white; width: 100vw; height: 100vh;">
  <div class="card p-4 p-md-5 shadow-sm mx-auto mt-5 border-danger" style="max-width: 500px;">
    <h2 class="text-danger fw-bold mb-3">Access Denied</h2>
    <p class="text-muted" id="accessDeniedMsg">You do not have permission to view the Scheduler.</p>
    <p id="deniedEmail" class="fw-bold mt-3 mb-4 text-secondary"></p>
    <button class="btn btn-outline-primary fw-bold w-100" onclick="signOut()">Sign In Again</button>
  </div>
</div>

<div id="secureAppContainer"></div>

<script>
  let licenseKey = '';

  document.addEventListener("DOMContentLoaded", function() {
    apiCall('getTemplateConfig').then(tConfig => {
        licenseKey = tConfig.license_key;
        
        if (tConfig.brand_logo_url) {
            const lImg = document.getElementById('loginLogo');
            lImg.src = tConfig.brand_logo_url; lImg.onload = () => lImg.style.opacity = '1';
        }
        if (tConfig.app_title) document.getElementById('loginTitle').innerText = tConfig.app_title + " Login";

        if (tConfig.google_client_id) {
            window.google.accounts.id.initialize({ client_id: tConfig.google_client_id, callback: handleCredentialResponse });
            window.google.accounts.id.renderButton(document.getElementById('googleSignInBtn'), { theme: "outline", size: "large", type: "standard" });
        }
        
        const savedEmail = localStorage.getItem('scheduler_user');
        const savedToken = localStorage.getItem('scheduler_token');
        if (savedEmail && savedToken) {
            window.ShellApp.currentUserEmail = savedEmail;
            bootApp();
        } else {
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('loginOverlay').classList.remove('hidden');
        }
    }).catch(e => {
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('accessDenied').classList.remove('hidden');
        document.getElementById('accessDeniedMsg').innerText = "System Configuration Error: " + e.message;
    });
  });

  async function apiCall(actionName, payloadData = {}) {
    const token = localStorage.getItem('scheduler_token');
    
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: actionName, userToken: token, ...payloadData })
    });
    const result = await response.json();
    
    if (result.error) {
        if (result.error.includes("SESSION_EXPIRED")) { signOut(true); return new Promise(() => {}); }
        throw new Error(result.error);
    }
    return result.data || result;
  }

  function handleCredentialResponse(response) {
    const jwt = response.credential;
    const payload = JSON.parse(atob(jwt.split('.')[1]));
    localStorage.setItem('scheduler_user', payload.email);
    localStorage.setItem('scheduler_token', jwt);   
    window.ShellApp.currentUserEmail = payload.email.toLowerCase().trim();
    bootApp();
  }

  function signOut(isExpired = false) {
    localStorage.removeItem('scheduler_user');
    localStorage.removeItem('scheduler_token');
    if(isExpired) alert("Session expired. Please log in again.");
    window.location.reload(); 
  }

  async function bootApp() {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('loadingOverlay').classList.remove('hidden');
    document.getElementById('loading-text').innerText = "Loading Secure Application...";
    
    try {
      const res = await apiCall('getSecureApp');
      const decryptedHtml = decryptPayloadBytes(res.data, licenseKey);
      
      const temp = document.createElement('div');
      temp.innerHTML = decryptedHtml;
      
      const styles = temp.querySelectorAll('style');
      styles.forEach(s => document.head.appendChild(s));
      
      const scripts = temp.querySelectorAll('script');
      scripts.forEach(s => s.remove());
      
      document.getElementById('secureAppContainer').innerHTML = temp.innerHTML;
      
      scripts.forEach((script) => {
        const newScript = document.createElement('script');
        newScript.text = script.text;
        document.body.appendChild(newScript);
      });
      
    } catch (err) {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('accessDenied').classList.remove('hidden');
      document.getElementById('accessDeniedMsg').innerText = err.message;
    }
  }

  function decryptPayloadBytes(base64Str, key) {
      const binaryStr = atob(base64Str);
      const keyBytes = new TextEncoder().encode(key);
      const decryptedBytes = new Uint8Array(binaryStr.length);
      for (let i = 0; i < binaryStr.length; i++) {
          decryptedBytes[i] = binaryStr.charCodeAt(i) ^ keyBytes[i % keyBytes.length];
      }
      return new TextDecoder().decode(decryptedBytes);
  }
</script>
</body>
</html>
